# Nombre del microservicio
spring.application.name=Customer-Service

# Puerto donde correrá este servicio
server.port=8082

# Configuración de Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/billingflow_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuración de RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Desactivar temporalmente la búsqueda de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Contraseña cuenta GMAIL: facturation07
# Configuración de Spring Mail con SendGrid
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
# El username es exactamente la palabra "apikey", no pongas tu correo aquí.
spring.mail.username=apikey
# Aquí pegas el código largo SG.xxxx... que acabas de copiar
spring.sendgrid.api-key=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true