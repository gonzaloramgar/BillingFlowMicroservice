# Nombre del microservicio
spring.application.name=Customer-Service

# Puerto donde correrá este servicio
server.port=8082

# Configuración de Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/billingflow_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuración de RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Desactivar temporalmente la búsqueda de Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CONFIGURACIÓN DEFINITIVA CON GMAIL SMTP (CORREOS REALES E ILIMITADOS)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=billingflowsupport@gmail.com
