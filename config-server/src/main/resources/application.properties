# Puerto por defecto
server.port=8888

# Nombre del servicio
spring.application.name=config-server
spring.cloud.config.server.git.search-paths=config
# URL de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- CONFIGURACIÓN DE GIT (REPOSITORIO PRIVADO) ---
spring.profiles.active=git

# 1. Tu URL de GitHub (fíjate que sea la HTTPS que termina en .git)
spring.cloud.config.server.git.uri=https://github.com/adrianmunozcasas-commits/config-server.git

# 2. Tu nombre de usuario de GitHub (ejemplo: juanperez99)
spring.cloud.config.server.git.username=adrianmunozcasas-commits

# 3. Token en variable de entorno para no exponer secretos en git
spring.cloud.config.server.git.password=${GITHUB_CONFIG_TOKEN:}

# Clona el repo al arrancar
spring.cloud.config.server.git.clone-on-start=true