# El puerto donde vivirá nuestro servicio de seguridad
server.port=9000

# El nombre oficial del servicio (¡Vital para que el Config-Server lo reconozca!)
spring.application.name=security-service

# 1. Regístrate en Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 2. Conéctate al Config-Server para descargar el resto de configuraciones
spring.config.import=optional:configserver:http://localhost:8888

# Clave JWT compartida (fallback local si no llega desde config-server)
jwt.secret=${JWT_SECRET:c2VjdXJpdHktc2VydmljZS1zaGFyZWQta2V5LXRvLWNoYW5nZS0zMmJ5dGVzLW1pbg==}

# Endpoint de login del customer-service para validar credenciales
customer.service.login-url=${CUSTOMER_LOGIN_URL:http://localhost:8082/api/customers/login}