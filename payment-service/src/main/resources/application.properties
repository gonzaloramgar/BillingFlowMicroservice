# ==============================================================
# CONFIGURACIÓN GENERAL
# ==============================================================
spring.application.name=payment-service
server.port=8081

# ==============================================================
# CONFIGURACIÓN MYSQL (LOCAL)
# ==============================================================
# Cambia 'billing_db' por el nombre real de tu base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/billingflow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / HIBERNATE
# ==============================================================
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Muestra las consultas SQL en la consola (muy útil para debuggear)
spring.jpa.show-sql=true
# Formatea el SQL en consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# CONFIGURACIÓN DE EUREKA CLIENT
# ==============================================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.config.import=configserver:http://localhost:8888

# ==============================================================
# CONFIGURACIÓN DE STRIPE
# ==============================================================
# ==============================================================
# LOGGING (OPCIONAL)
# ==============================================================
# Para ver errores detallados de Spring Data o Stripe
logging.level.com.example.payment_service=DEBUG