<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillingFlow - Iniciar sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-page">

    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="img/logo.png" alt="BillingFlow Logo" class="logo-img">
        </a>
        <div class="nav-links">
            <a href="index.html" class="back-link">← Volver al inicio</a>
            <a href="checkout.html" class="btn-nav">Comprar</a>
        </div>
    </nav>

    <main class="container-register">
        <div class="register-card">
            <div class="register-header">
                <h1>Iniciar sesión</h1>
                <p>Accede con el correo que utilizaste durante el registro tras el pago.</p>
            </div>

            <form class="register-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="Tu contraseña" required>
                </div>

                <button type="submit" class="btn-large">Entrar</button>
                <p class="form-footer">Esta pantalla está lista para conectar con tu API de login cuando la tengas disponible.</p>
            </form>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container footer-layout">
            <p>&copy; 2026 BillingFlow System - Eficiencia Profesional</p>
            <div class="footer-links">
                <a href="terms.html">Términos</a>
                <a href="privacy.html">Privacidad</a>
                <a href="checkout.html" class="buy-link">Comprar</a>
            </div>
        </div>
    </footer>

</body>
</html>
